<div class="min-h-screen flex flex-col bg-gray-800">
  <div class="bg-gray-800 text-white p-3 font-sans">

  </div>

  <div class="bg-gray-300 rounded-t-3xl overflow-hidden flex flex-col">

    <!-- component de pesquisa -->
