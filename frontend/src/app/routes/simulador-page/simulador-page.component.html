<div class="h-screen flex flex-col bg-gray-800 overflow-hidden">
  <!-- header não cresce -->
  <div class="shrink-0 bg-gray-800 text-white p-3 font-sans">
    <h1 class="w-full text-center text-sm quick">Você está em um ambiente de teste</h1>
  </div>

  <!-- ocupa o resto da tela -->
  <div class="flex-1 min-h-0 bg-gray-300 rounded-t-3xl overflow-hidden flex">
    
    <!-- sidebar: altura do pai, NÃO h-screen -->
    <div class="w-90 h-full border-r flex flex-col items-start justify-start p-5">
      
      <!-- pesquisa -->
      <div class="flex items-center gap-2 w-81">
        <input type="text" placeholder="Buscar"
          class="w-65 h-10 rounded-xl bg-gray-100 px-4 text-gray-700 placeholder:text-gray-500 outline-none" />

        <button type="button"
          class="h-10 w-12 rounded-xl bg-gray-900 hover:bg-gray-600 cursor-pointer flex items-center justify-center"
          aria-label="Buscar">
          <!-- svg... -->
        </button>
      </div>

      <!-- menu: deixa crescer sem estourar a altura -->
      <div class="mt-10 flex flex-col flex-1 min-h-0 overflow-hidden">
        <app-menu-options imagePath="/inicio.svg" title="Menu Principal"></app-menu-options>
        <app-menu-options imagePath="/wallet.svg" title="Simular"></app-menu-options>
        <app-menu-options imagePath="/badge-dollar-sign.svg" title="Resultados"></app-menu-options>
        <app-menu-options imagePath="/history.svg" title="Históricos"></app-menu-options>
        <app-menu-options imagePath="/settings.svg" title="Configurações"></app-menu-options>
      </div>

      <!-- perfil no fim -->
      <div class="mt-auto p-4 bg-gray-200">
        <img src="" alt="">
        <h1>Nome</h1>
      </div>

    </div>

  </div>
</div>
