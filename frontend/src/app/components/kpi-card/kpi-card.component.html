<div class="w-full rounded-2xl border border-zinc-200 bg-white p-3 shadow-sm">
  <!-- header -->
  <div class="flex items-start justify-between gap-4">
    <p class="text-sm font-medium text-zinc-500">
      {{ title }}
    </p>

    <!-- badge -->
    <span
      class="inline-flex items-center gap-1 rounded-full border px-2.5 py-1 text-xs font-medium"
      [ngClass]="badgeUp
        ? 'border-emerald-200 bg-emerald-50 text-emerald-700'
        : 'border-rose-200 bg-rose-50 text-rose-700'"
    >
      <!-- icon -->
      <svg *ngIf="badgeUp" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none">
        <path d="M7 17L17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M9 7h8v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <svg *ngIf="!badgeUp" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none">
        <path d="M7 7l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M9 17h8V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      {{ badge }}
    </span>
  </div>

  <!-- value -->
  <div class="mt-3">
    <h2 class="text-3xl font-semibold tracking-tight tabular-nums text-zinc-900">
      {{ value }}
    </h2>
  </div>

  <!-- footer -->
  <div class="mt-4 space-y-1">
    <div class="flex items-center gap-2 text-sm font-semibold text-zinc-900">
      <span>{{ strongLine }}</span>

      <svg class="h-4 w-4 text-zinc-900" viewBox="0 0 24 24" fill="none">
        <path d="M7 17L17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M9 7h8v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="text-sm text-zinc-500">
      {{ subLine }}
    </p>
  </div>
</div>
