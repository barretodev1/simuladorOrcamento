<div class="relative w-60">

  <button
    type="button"
    (click)="go()"
    class="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-xl cursor-pointer transition-colors duration-100 h-10 w-full"
  >
    <img class="h-5 w-5 shrink-0 block" [src]="imagePath" alt="">
    <h1 class="quick m-0 text-black leading-none">{{ title }}</h1>
  </button>

  <!-- DROPDOWN -->
  <div
    *ngIf="isUser && showDropdown"
    class="absolute bottom-12 left-0 w-full bg-white border border-gray-200 rounded-xl shadow-lg p-2 z-50"
  >
    <button
      (click)="logout()"
      class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 text-sm text-red-600"
    >
      Fazer logout
    </button>
  </div>

</div>
