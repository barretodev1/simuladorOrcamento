version: "3.9"

services:
  backend:
    build: ./backend
    container_name: simulador-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: simulador-frontend
    ports:
      - "4200:80" # se for Angular dev
    depends_on:
      - backend
    restart: unless-stopped
